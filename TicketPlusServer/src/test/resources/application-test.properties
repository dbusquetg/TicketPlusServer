
# Perfil de test: sustituye PostgreSQL por H2 en memoria
# Coloca este fichero en: src/test/resources/application-test.properties


# H2 en memoria  se crea al arrancar los tests y se destruye al acabar
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA crea el esquema autom\u00e1ticamente a partir de las entidades
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Desactiva el schema.sql del main para no interferir con H2
spring.sql.init.mode=never

# JWT  valores de prueba (no uses estos valores en producci\u00c3\u00b3n)
